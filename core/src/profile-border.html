<details class="section collapsible" id="profile-border-details">
  <summary><h2>Open Profiles Outside Boundary</h2></summary>
  <div class="collapsible-body">
    <p class="hint">Bypass the paywall by directly opening profiles outside your boundary.</p>
    <label class="row">
      <input id="profile-border-enabled" type="checkbox" />
      <span>Enable</span>
    </label>
    <div id="profile-border-fields">
      <label class="field">
        <span>Open in</span>
        <select id="profile-border-tab">
          <option value="new-tab">New tab</option>
          <option value="current-tab">Current tab</option>
        </select>
      </label>
    </div>
  </div>
</details>
