name: Release Chrome Extension

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install
        working-directory: client

      - name: Build extension
        run: |
          VERSION=$(node -p "require('./package.json').version")
          yarn build:prod $VERSION
        working-directory: client
        env:
          SERVER_BASE: ${{ secrets.SERVER_BASE }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

      - name: Zip dist
        run: zip -r sniffies-chrome.zip dist/
        working-directory: client

      - name: Publish release
        run: |
          gh release delete latest-chrome --yes --cleanup-tag 2>/dev/null || true
          gh release create latest-chrome \
            --title "Latest Chrome Build" \
            --notes "Automated build from [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" \
            client/sniffies-chrome.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
