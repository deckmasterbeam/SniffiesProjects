name: Release Userscript

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: userscript

      - name: Build userscript
        run: npm run build:prod
        working-directory: userscript

      - name: Commit dist to repo
        run: |
          mkdir -p dist
          cp userscript/dist/sniffies-tools.user.js dist/sniffies-tools.user.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/sniffies-tools.user.js
          git diff --cached --quiet || git commit -m "chore: update dist/sniffies-tools.user.js [skip ci]"
          git push origin HEAD:main

      - name: Publish release
        run: |
          gh release delete latest-userscript --yes --cleanup-tag 2>/dev/null || true
          gh release create latest-userscript \
            --title "Latest Userscript Build" \
            --notes "Automated build from [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" \
            userscript/dist/sniffies-tools.user.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
