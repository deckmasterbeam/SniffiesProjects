<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popup</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <h1>Sniffies Plug-ins</h1>
        <button
          id="open-settings"
          class="primary"
          type="button"
          title="Settings"
          aria-label="Open settings"
        >
          ⚙
        </button>
      </header>

      <div id="snp-geo-root"></div>

      <details id="profile-border-details" class="section collapsible">
        <summary><h2>Open Profiles Outside Boundary</h2></summary>
        <div class="collapsible-body">
          <p class="hint">
            Bypass the paywall by directly opening profiles outside your boundary. Recommend opening
            in a new tab, current tab triggers current page reload.
          </p>
          <label class="row">
            <input id="profile-border-enabled" type="checkbox" />
            <span>Enable</span>
          </label>
          <label id="profile-border-tab-field" class="field">
            <span>Open in</span>
            <select id="profile-border-tab">
              <option value="current-tab">Current tab</option>
              <option value="new-tab">New tab</option>
            </select>
          </label>
          <div class="actions">
            <button id="profile-border-save" class="primary" type="button" style="display: none">
              Save
            </button>
          </div>
        </div>
      </details>

      <details id="favorites-details" class="section collapsible">
        <summary><h2>Favorites</h2></summary>
        <div class="collapsible-body">
          <p id="favorites-hint" class="hint"></p>
          <label class="row">
            <input id="favorites-enabled" type="checkbox" />
            <span id="favorites-enable-label">Enable</span>
          </label>
        </div>
      </details>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
