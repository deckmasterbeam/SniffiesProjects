<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popup</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <h1>Sniffies Plug-ins</h1>
        <button
          id="open-settings"
          class="primary"
          type="button"
          title="Settings"
          aria-label="Open settings"
        >
          ⚙
        </button>
      </header>

      <details class="section collapsible">
        <summary><h2>Location Spoofing</h2></summary>
        <div class="collapsible-body">
          <p class="hint">Spoof the coordinates Sniffies sees.</p>
          <label class="row">
            <input id="geo-enabled" type="checkbox" />
            <span>Enable</span>
          </label>
          <div id="geo-fields">
            <label class="field">
              <span>Latitude</span>
              <input id="geo-lat" type="number" step="any" placeholder="47.61477" autocomplete="off" />
            </label>
            <label class="field">
              <span>Longitude</span>
              <input
                id="geo-lng"
                type="number"
                step="any"
                placeholder="-122.32525"
                autocomplete="off"
              />
            </label>
            <button id="geo-fill-current" class="secondary" type="button">Fill with current</button>
            <label class="field">
              <span>Accuracy (m) (randomized)</span>
              <input id="geo-accuracy" type="number" step="any" placeholder="10" autocomplete="off" />
            </label>
            <div class="actions">
              <button id="geo-save" class="primary" type="button">Save</button>
            </div>
            <p id="geo-status" class="hint" aria-live="polite"></p>
          </div>
        </div>
      </details>

      <details id="favorites-details" class="section collapsible">
        <summary><h2>Favorites</h2></summary>
        <div class="collapsible-body">
          <label class="row">
            <input id="favorites-enabled" type="checkbox" />
            <span>Enable</span>
          </label>
        </div>
      </details>

      <details id="profile-border-details" class="section collapsible">
        <summary><h2>Open Profiles Outside Boundary</h2></summary>
        <div class="collapsible-body">
          <p class="hint">Bypass the paywall by directly opening profiles outside your boundary. Recommend opening in a new tab, current tab triggers current page reload.</p>
          <label class="row">
            <input id="profile-border-enabled" type="checkbox" />
            <span>Enable</span>
          </label>
          <label id="profile-border-tab-field" class="field">
            <span>Open in</span>
            <select id="profile-border-tab">
              <option value="current-tab">Current tab</option>
              <option value="new-tab">New tab</option>
            </select>
          </label>
          <div class="actions">
            <button id="profile-border-save" class="primary" type="button" style="display: none;">Save</button>
          </div>
        </div>
      </details>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
